<!DOCTYPE html>
<!--
  Agro Connect — social share cover (OG image source), 1200×630.
  Standalone file: open directly in a browser and screenshot the
  #stage element (exactly 1200×630, no scroll) to produce preview.png,
  mirroring the pattern used by Strength Split's preview.svg/preview.png.
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Agro Connect — social share cover</title>

<!-- Same font mechanism as the real app: Sora for display, system-ui for body -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --brand: #1E4620;
    --accent: #2E7D32;
    --accent-tint: #E2F1DC;
    --bg: #F5F1E8;
    --surface: #FFFEFA;
    --border: rgba(30, 70, 32, 0.14);
    --text: #1A2418;
    --text-muted: #56604F;
    --on-brand: #FFFFFF;

    --radius-md: 16px;
    --radius-lg: 20px;
    --radius-full: 999px;

    --shadow-md: 0 2px 4px rgba(20, 35, 18, 0.05), 0 10px 28px rgba(20, 35, 18, 0.09);
    --shadow-lg: 0 4px 10px rgba(20, 35, 18, 0.08), 0 18px 44px rgba(20, 35, 18, 0.14);

    --font-display: "Sora", system-ui, sans-serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #DCD5C4; /* letterbox around the stage, not part of the export */
  }

  #stage {
    position: relative;
    width: 1200px;
    height: 630px;
    margin: 0 auto;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
  }

  /* ---------- Left column: kicker, headline, tagline ---------- */

  .accent-bar {
    position: absolute;
    left: 64px;
    top: 96px;
    width: 6px;
    height: 300px;
    border-radius: 3px;
    background: var(--accent);
  }

  .kicker {
    position: absolute;
    left: 90px;
    top: 108px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .headline {
    position: absolute;
    left: 88px;
    top: 148px;
    font-family: var(--font-display);
    line-height: 1.02;
    letter-spacing: 0.01em;
  }
  .headline div { text-transform: uppercase; }
  .headline .l1 { font-weight: 800; font-size: 82px; color: var(--text); }
  .headline .l2 { font-weight: 600; font-size: 82px; color: var(--brand); }

  .tagline {
    position: absolute;
    left: 90px;
    top: 372px;
    width: 540px;
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 21px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  /* ---------- Footer ---------- */

  .footer-rule {
    position: absolute;
    left: 64px;
    right: 64px;
    top: 560px;
    height: 1px;
    background: var(--border);
  }

  .footer-brand {
    position: absolute;
    left: 64px;
    top: 578px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.06em;
    color: var(--brand);
  }
  .footer-brand svg { display: block; stroke: var(--brand); }

  .footer-note {
    position: absolute;
    right: 64px;
    top: 581px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text-muted);
  }

  /* ---------- Right side: real-UI recorte ---------- */

  .ui-frame {
    position: absolute;
    left: 660px;
    top: 90px;
    width: 476px;
    height: 400px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 24px;
  }

  .ui-frame-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .ui-frame-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
  }
  .ui-sync {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .ui-sync .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .stat-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat-tile {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-md);
  }
  .stat-value {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 32px;
    line-height: 1.1;
    color: var(--brand);
    letter-spacing: -0.02em;
  }
  .stat-value small {
    font-size: 0.5em;
    font-weight: 700;
    color: var(--text-muted);
  }
  .stat-label {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .kpi-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--accent-tint);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .kpi-icon {
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border-radius: var(--radius-full);
    background: var(--surface);
    flex: 0 0 auto;
  }
  .kpi-icon svg { stroke: var(--accent); }
  .kpi-label {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--brand);
  }
  .kpi-value {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    color: var(--brand);
    white-space: nowrap;
  }

  .tabbar-mock {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: rgba(247, 243, 234, 0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 4px 8px;
  }
  .tabbar-mock .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .tabbar-mock .tab-icon {
    display: grid;
    place-items: center;
    width: 44px;
    height: 26px;
    border-radius: var(--radius-full);
  }
  .tabbar-mock .tab-icon svg { stroke: var(--text-muted); }
  .tabbar-mock .tab.active { color: var(--brand); }
  .tabbar-mock .tab.active .tab-icon { background: var(--accent-tint); }
  .tabbar-mock .tab.active .tab-icon svg { stroke: var(--brand); }

  /* ---------- Connection motif: producer <-> field, quiet corner accent ---------- */

  .motif {
    position: absolute;
    left: 918px;
    top: 22px;
    width: 218px;
    height: 58px;
    opacity: 0.4;
  }
</style>
</head>
<body>

  <div id="stage">

    <div class="accent-bar" aria-hidden="true"></div>

    <p class="kicker">GESTÃO · GADO DE CORTE</p>

    <div class="headline">
      <div class="l1">AGRO</div>
      <div class="l2">CONNECT</div>
    </div>

    <p class="tagline">Do pasto ao abate — rebanho, finanças e indicadores em um só lugar.</p>

    <div class="footer-rule"></div>
    <div class="footer-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 20c0-8 4-14 12-16 1 8-2 15-10 16" />
        <path d="M6 20c2-6 6-10 10-12" />
      </svg>
      AGRO CONNECT
    </div>
    <div class="footer-note">Sincronizado na nuvem · login Google</div>

    <!-- Quiet line-art motif: producer glyph linked to a pasture/cattle glyph -->
    <svg class="motif" viewBox="0 0 218 58" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <!-- producer -->
      <circle cx="16" cy="16" r="8" />
      <path d="M2 46c2-12 8-18 14-18s12 6 14 18" />
      <!-- connecting line with node dots -->
      <circle cx="30" cy="30" r="2.2" fill="var(--accent)" stroke="none" />
      <path d="M32 30h154" stroke-dasharray="2 6" />
      <circle cx="188" cy="30" r="2.2" fill="var(--accent)" stroke="none" />
      <!-- pasture / cattle glyph (ear tag + grass) -->
      <path d="M182 12h20a2 2 0 0 1 2 2v16a12 12 0 0 1-24 0V14a2 2 0 0 1 2-2z" />
      <circle cx="192" cy="20" r="1.8" fill="var(--accent)" stroke="none" />
      <path d="M172 48c3-6 6-8 10-8M182 48c2-8 5-11 9-11M192 48c2-7 4-9 7-9" />
    </svg>

    <!-- Real-UI recorte: summary stats + GMD KPI + bottom tab bar -->
    <div class="ui-frame">
      <div class="ui-frame-header">
        <span class="ui-frame-title">Rebanho</span>
        <span class="ui-sync"><span class="dot" aria-hidden="true"></span>Sincronizado</span>
      </div>

      <div class="stat-row">
        <div class="stat-tile">
          <p class="stat-value">342</p>
          <p class="stat-label">Cabeças no rebanho</p>
        </div>
        <div class="stat-tile">
          <p class="stat-value">1.284 <small>@</small></p>
          <p class="stat-label">Estoque estimado</p>
        </div>
      </div>

      <div class="kpi-row">
        <span class="kpi-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>
        </span>
        <span class="kpi-label">GMD do rebanho</span>
        <span class="kpi-value">920 g/dia</span>
      </div>

      <nav class="tabbar-mock" aria-hidden="true">
        <div class="tab active">
          <span class="tab-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10a1 1 0 0 1 1 1v9a6 6 0 0 1-12 0V4a1 1 0 0 1 1-1z"/><circle cx="12" cy="7" r="1.4"/></svg>
          </span>
          Rebanho
        </div>
        <div class="tab">
          <span class="tab-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>
          </span>
          Financeiro
        </div>
        <div class="tab">
          <span class="tab-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M5 20V12"/><path d="M12 20V6"/><path d="M19 20v-4"/></svg>
          </span>
          Indicadores
        </div>
        <div class="tab">
          <span class="tab-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
          </span>
          Perfil
        </div>
      </nav>
    </div>

  </div>

</body>
</html>
