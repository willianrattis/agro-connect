<!DOCTYPE html>
<!--
  Agro Connect
  Visual skeleton (Phase 2). No Firebase yet — mock/static data only.
  See docs/SPEC.md for the full product & technical spec.
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agro Connect</title>
<style>

  /* =====================================================
     Design Tokens
     ===================================================== */
  :root {
    /* Colors */
    --color-primary: #2e7d32;
    --color-primary-dark: #1b5e20;
    --color-primary-light: #60ad5e;
    --color-accent: #f9a825;
    --color-earth: #6d4c41;

    --color-bg: #f4f7f2;
    --color-surface: #ffffff;

    --color-text: #1c2b1a;
    --color-muted: #5f6b5c;

    --color-on-primary: #ffffff;

    /* Shape */
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0, 0, 0, .08);

    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;

    /* Layout */
    --container-max: 640px;
    --header-height: 56px;

    /* Typography (responsive via clamp) */
    --font-size-base: 1rem;
    --font-size-sm: 0.875rem;
    --font-size-lg: clamp(1.05rem, 1rem + 0.4vw, 1.2rem);
    --font-size-xl: clamp(1.15rem, 1.05rem + 0.8vw, 1.4rem);
  }

  /* =====================================================
     Reset / Base
     ===================================================== */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: var(--font-size-base);
    line-height: 1.5;
    padding-top: var(--header-height);
  }

  h1, h2, h3, p {
    margin: 0;
  }

  button {
    font: inherit;
    color: inherit;
  }

  ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  a {
    color: var(--color-primary-dark);
  }

  /* Keyboard focus visibility (accessibility) */
  :focus-visible {
    outline: 3px solid var(--color-accent);
    outline-offset: 2px;
  }

  /* =====================================================
     Layout / Container
     ===================================================== */
  .container {
    max-width: var(--container-max);
    margin-inline: auto;
    padding-inline: var(--space-4);
  }

  /* =====================================================
     Header
     ===================================================== */
  .app-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: var(--header-height);
    display: flex;
    align-items: center;
    background: var(--color-primary);
    box-shadow: var(--shadow);
  }

  .app-header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .app-header .brand {
    color: var(--color-on-primary);
    font-size: var(--font-size-xl);
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .btn-login {
    min-height: 44px;
    padding: var(--space-2) var(--space-4);
    background: var(--color-primary-dark);
    color: var(--color-on-primary);
    border: none;
    border-radius: var(--radius);
    font-size: var(--font-size-sm);
    font-weight: 600;
    cursor: pointer;
  }

  .btn-login:hover {
    background: var(--color-primary-light);
  }

  /* =====================================================
     Main / Content / Cards
     ===================================================== */
  .app-main {
    padding-block: var(--space-5) var(--space-6);
    min-height: calc(100vh - var(--header-height));
  }

  .section-title {
    font-size: var(--font-size-lg);
    font-weight: 700;
    margin-bottom: var(--space-4);
    color: var(--color-primary-dark);
  }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .card {
    background: var(--color-surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--space-4);
    border-left: 4px solid var(--color-primary-light);
  }

  .card-title {
    font-size: var(--font-size-lg);
    font-weight: 600;
    margin-bottom: var(--space-1);
  }

  .card-meta {
    font-size: var(--font-size-sm);
    color: var(--color-muted);
    margin-bottom: var(--space-2);
  }

  .card-desc {
    font-size: var(--font-size-base);
  }

  .badge {
    display: inline-block;
    margin-top: var(--space-2);
    padding: var(--space-1) var(--space-3);
    background: var(--color-accent);
    color: var(--color-text);
    border-radius: 999px;
    font-size: var(--font-size-sm);
    font-weight: 600;
  }

  /* =====================================================
     Footer
     ===================================================== */
  .app-footer {
    padding-block: var(--space-4);
    text-align: center;
    color: var(--color-muted);
    font-size: var(--font-size-sm);
  }

  /* =====================================================
     FAB (Floating Action Button)
     ===================================================== */
  .fab {
    position: fixed;
    right: var(--space-5);
    bottom: var(--space-5);
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 50%;
    background: var(--color-accent);
    color: var(--color-text);
    font-size: 1.75rem;
    line-height: 1;
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .fab:hover {
    background: var(--color-primary-light);
    color: var(--color-on-primary);
  }

  /* =====================================================
     Responsive (wider viewports)
     ===================================================== */
  @media (min-width: 480px) {
    .app-header .brand {
      letter-spacing: 0.3px;
    }
  }

  @media (min-width: 640px) {
    :root {
      --header-height: 64px;
    }

    .container {
      padding-inline: var(--space-5);
    }
  }

</style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="app-header">
    <div class="container">
      <h1 class="brand">Agro Connect</h1>
      <div class="session-area">
        <button type="button" class="btn-login" id="login-btn">Log In</button>
      </div>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="app-main">
    <div class="container">
      <h2 class="section-title">Meus itens</h2>
      <ul class="item-list" id="item-list">
        <!-- Cards rendered by JS from mock data -->
      </ul>
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="app-footer">
    <div class="container">
      <p>Agro Connect &mdash; protótipo visual</p>
    </div>
  </footer>

  <!-- ===== FAB ===== -->
  <button type="button" class="fab" id="fab-add" aria-label="Adicionar item">+</button>

  <script type="module">

    // =====================================================
    // Mock Data (placeholder until Firestore is wired in)
    // =====================================================
    const mockItems = [
      {
        id: "mock-1",
        title: "Talhão A — Milho",
        meta: "Atualizado há 2 dias",
        description: "Plantio em estágio vegetativo, irrigação em dia.",
        badge: "Em andamento",
      },
      {
        id: "mock-2",
        title: "Estoque — Fertilizante NPK",
        meta: "Atualizado há 5 dias",
        description: "12 sacos de 25kg disponíveis no galpão 2.",
        badge: "Estoque baixo",
      },
      {
        id: "mock-3",
        title: "Colheita — Trigo",
        meta: "Atualizado hoje",
        description: "Previsão de colheita concluída na próxima semana.",
        badge: "Planejado",
      },
    ];

    // =====================================================
    // DOM References
    // =====================================================
    const itemListEl = document.getElementById("item-list");
    const loginBtn = document.getElementById("login-btn");
    const fabBtn = document.getElementById("fab-add");

    // =====================================================
    // Render Functions
    // =====================================================
    function renderItems(items) {
      itemListEl.innerHTML = items
        .map(
          (item) => `
            <li class="card">
              <h3 class="card-title">${item.title}</h3>
              <p class="card-meta">${item.meta}</p>
              <p class="card-desc">${item.description}</p>
              <span class="badge">${item.badge}</span>
            </li>
          `
        )
        .join("");
    }

    // =====================================================
    // Event Listeners (placeholders — wired to Firebase later)
    // =====================================================
    loginBtn.addEventListener("click", () => {
      console.log("[Agro Connect] Login clicked (placeholder — Firebase Auth pending).");
    });

    fabBtn.addEventListener("click", () => {
      console.log("[Agro Connect] FAB clicked (placeholder — add-item modal pending).");
    });

    // =====================================================
    // Init
    // =====================================================
    renderItems(mockItems);

  </script>

</body>
</html>
